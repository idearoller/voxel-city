<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxelCity</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #app {
        position: fixed;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        /* Touch-only: stop the browser's scroll/pinch-zoom gestures from
           competing with the joystick/look-drag touch handlers. No effect
           on mouse/trackpad input. */
        touch-action: none;
      }
      #ui-root {
        position: fixed;
        inset: 0;
        pointer-events: none;
        font-family: system-ui, sans-serif;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
