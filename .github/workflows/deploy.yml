name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; queue (don't cancel) in-progress runs, so
# a second push while a deploy is underway can't cancel it mid-flight and
# leave a stale/failed Pages deployment (matches GitHub's own Pages template).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # The Pages backend occasionally returns a transient
      # "Deployment failed, try again later." error even when the build
      # artifact is fine. Since no deployment is created when this call
      # fails outright, a single unconditional retry is safe (no stale
      # deployment to clean up) and cheap. `continue-on-error` keeps this
      # attempt from failing the job by itself so the retry step below can
      # run; the job only fails for real if the retry also fails.
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
